schema: agentread/v0.3
project_name: literary-engineering-project-skill
language: zh-CN
purpose: >
  Project-type Skill for tool-layer agents. The host Agent performs creative
  and review judgment; the CLI state machine supplies task packages,
  provenance, deterministic evidence, and route gates.

read_first:
  - SKILL.md
  - AGENTS.md
  - references/formal-host-operating-constitution.md
  - references/agent-run-protocol.md

core_references:
  formal_host_operating_constitution: references/formal-host-operating-constitution.md
  agent_run_protocol: references/agent-run-protocol.md
  cli_run_protocol: references/cli-run-protocol.md
  punctuation_standard: references/punctuation-standard.md
  developer_workflows: references/workflows.md
  artifact_contracts: references/artifact-contracts.md
  prompt_registry: docs/modules/prompt-registry.md
  workflow_state_machine: docs/modules/workflow-state-machine.md

host_operating_contract:
  authority_order:
    - task-next chooses the next formal task for a registered route.
    - task-open is the executable package and may include prompt assets, source_paths, expected_outputs, hard_constraints, and forbidden_shortcuts.
    - .agent_tasks.md files are pending work until an adjacent .agent_completion.json exists.
    - task-submit records the host Agent artifact.
    - task-complete validates expected outputs.
    - route-audit is the formal pass/fail ledger.
    - workflow-state and workflow-dashboard are navigation/read-only summaries.
  formal_host_must_not:
    - directly handwrite CLI-generated flow artifacts as formal outputs
    - skip task sidecars
    - use debug waiver flags in formal work
    - let subagents write body prose or final creative text
    - bypass review, promotion, export, release, state, or canon gates
    - treat generated JSON, simulation scores, or branch recommendations as accepted project state
  host_reads:
    - the current task package
    - the prompt asset resolved by task-open
    - source_paths listed by the task package
    - extra files only when the task package, route protocol, or user explicitly requires them
  host_writes:
    - expected_outputs listed by the task package
    - completion markers required by sidecars
    - submissions through task-submit

registered_routes:
  - scene-development
  - longform-planning
  - source-ingest
  - style-engineering
  - character-and-world-assets
  - review-and-audit
  - export-and-release

route_entrypoint:
  command_template: python -m literary_engineering_workbench task-next <project> --route <route>
  open_template: python -m literary_engineering_workbench task-open <project> --task-id <task_id>
  submit_template: python -m literary_engineering_workbench task-submit <project> --task-id <task_id> --from <artifact>
  complete_template: python -m literary_engineering_workbench task-complete <project> --task-id <task_id>
  audit_template: python -m literary_engineering_workbench route-audit <project> --route <route>

developer_notes:
  detailed_docs_location:
    - references/
    - docs/
    - templates/
    - schemas/
    - src/
    - tests/
  rule: >
    Detailed docs support Skill maintenance and debugging. Ordinary formal
    host operation should follow the CLI task package rather than navigating
    the project structure manually.
