schema: agentread/v0.2
project_name: literary-engineering-project-skill
language: zh-CN
purpose: >
  给 Codex、Claude 等工具层 agent 使用的大型项目型 Skill。
  平台 agent 担任项目总监、创作总监、LLM provider 和子 agent 编排者；
  本项目提供文学工程文件结构、artifact contract、文风机制、审查流程和可选 CLI 工具。

read_first:
  - SKILL.md
  - AGENTS.md
  - CLAUDE.md
  - references/agent-run-protocol.md
  - references/project-director-playbook.md

core_references:
  agent_run_protocol: references/agent-run-protocol.md
  cli_run_protocol: references/cli-run-protocol.md
  project_director: references/project-director-playbook.md
  artifact_contracts: references/artifact-contracts.md
  workflows: references/workflows.md
  orchestration: references/orchestration.md
  punctuation_standard: references/punctuation-standard.md
  project_type_skill_architecture: docs/architecture/project-type-skill.md

core_project_files:
  skill_entry: SKILL.md
  agent_entry: AGENTS.md
  claude_entry: CLAUDE.md
  project_router: agentread.yaml
  optional_toolkit_development: src/literary_engineering_workbench/
  optional_toolkit_installed: scripts/literary_engineering_workbench/
  templates: templates/
  schemas: schemas/
  docs: docs/

governance:
  tool_layer_participation_required_for:
    - creative generation and revision
    - LLM-authored JSON and schema repair
    - style-prompt creation and evaluation
    - character, world, outline, and relationship candidate assets
    - roleplay, branch, scene, consequence, and state simulations
    - review findings, committee reports, and patch plans
    - promotion recommendations, release choices, and free project decisions
  formal_nondeterministic_commands_are: platform_agent_task_sidecars
  local_model_commands_are: legacy_debug_only
  required_platform_agent_actions:
    - choose task, prompt, context packet, and guardrails
    - read generated .agent_tasks.md files
    - write expected JSON/Markdown/prose artifacts when a task requires platform judgment
    - inspect raw and parsed outputs
    - run or perform schema, canon, character, style, and safety review
    - decide revise, keep as candidate, ask user, approve internally, or promote after approval
  never_auto_accept:
    - generated JSON
    - simulation recommendations
    - branch scores
    - local director decisions
    - provider-generated prose

route_execution_contract:
  applies_to:
    - project_director
    - work_project_initialization
    - style_engineering
    - character_and_world_assets
    - scene_development
    - review_and_audit
    - export_and_release
    - optional_cli
  mandatory_preflight:
    - classify workspace type
    - select one primary route from task_routes
    - read references/agent-run-protocol.md
    - read route-specific references before changing artifacts
    - inspect current project state and latest review/workflow/approval records
    - state intended artifacts, review gates, and approval boundary
  cli_preflight:
    - read references/cli-run-protocol.md before any CLI-backed task
    - run "python -m literary_engineering_workbench protocol <route>" before route-specific command chains
    - inspect command output paths instead of trusting terminal success alone
    - read and execute .agent_tasks.md sidecars when generated
  completion_gates:
    - route selected and route references accounted for
    - project state inspected
    - platform agent handled every creative, review, JSON, simulation, and second-level decision
    - schema/canon/character/style/punctuation/release checks applied when relevant
    - candidate, promoted, revised, blocked, and approval-pending artifacts clearly separated
    - final response reports changed files, checks run, and pending approval decisions
  forbidden_shortcuts:
    - do not accept CLI output as canon or final creative judgment
    - do not accept generated JSON because it parses
    - do not skip .agent_tasks.md handling when a command writes sidecars
    - do not promote candidates without review and approval unless the user asks for an internal experiment
    - do not skip Chinese punctuation review for Chinese prose
    - do not store API keys or provider secrets in work projects

task_routes:
  project_director:
    protocol: project-director
    when:
      - 用户给大方向、继续、修改创作口味、决定下一步
      - 需要 Codex/Claude 接管项目管理而非调用内部 director-chat
    read:
      - references/project-director-playbook.md
      - references/artifact-contracts.md
      - project.yaml
    inspect_if_present:
      - canon/
      - characters/
      - plot/
      - style/
      - scenes/
      - drafts/
      - reviews/
      - memory/
      - workflow/
      - director/
    output:
      - user-facing creative summary
      - candidate plan or candidate files
      - review/audit notes
      - next high-level creative choice
    completion_gates:
      - current project status inspected
      - broad direction converted into candidate plan or concrete project action
      - user-facing answer hides internal schema noise unless requested

  work_project_initialization:
    protocol: work-project-initialization
    when:
      - 新建小说、剧本、伪记录、短剧或长视频提示词项目
    read:
      - references/project-director-playbook.md
      - references/artifact-contracts.md
      - templates/work-project/project.yaml
      - docs/architecture/data-model.md
      - docs/implementation/phase1-initializer.md
    output:
      - work project skeleton
      - initial premise and project brief
      - first candidate-generation plan
      - approval boundaries
    completion_gates:
      - project skeleton exists or planned path is explicit
      - initial creative brief remains candidate until reviewed
      - approval boundaries recorded

  style_engineering:
    protocol: style-engineering
    when:
      - 文风学习、作家风格项目、Style Skill、文风挂载、回译/扩写评测
    read:
      - references/project-director-playbook.md
      - references/artifact-contracts.md
      - references/workflows.md
      - docs/modules/style-compiler.md
      - docs/implementation/phase58-author-style-projects.md
      - docs/implementation/phase59-style-skill-package.md
      - docs/implementation/phase60-style-skill-mount.md
      - docs/implementation/phase61-style-priority-enforcement.md
    output:
      - author style project
      - work subproject
      - style profile
      - LLM-facing style prompt
      - mountable Style Skill
      - style risk/effectiveness review
    completion_gates:
      - corpus authorization or public-domain assumption recorded
      - style prompt created or platform-agent task sidecar handled
      - effectiveness/risk review completed before mounting as priority style

  character_and_world_assets:
    protocol: character-and-world-assets
    when:
      - 创建或修改人物、背景故事、关系、世界观、地点、组织、主线大纲
    read:
      - references/project-director-playbook.md
      - references/artifact-contracts.md
      - docs/implementation/phase37-asset-candidate-schemas.md
      - docs/implementation/phase38-agent-character-creation.md
      - docs/implementation/phase39-agent-worldbuilding.md
      - docs/implementation/phase40-agent-outline-creation.md
      - docs/implementation/phase41-candidate-review-promotion.md
    output:
      - candidate assets
      - candidate review
      - promotion recommendation
      - user approval question
    completion_gates:
      - asset written as candidate first
      - schema and canon risks reviewed
      - explicit approval required before promotion

  scene_development:
    protocol: scene-development
    when:
      - 场景推进、剧情分支、正文候选、人物状态演化
    read:
      - references/project-director-playbook.md
      - references/artifact-contracts.md
      - docs/modules/plot-scene-engine.md
      - docs/modules/character-engine.md
      - docs/implementation/phase20-branch-simulation.md
      - docs/implementation/phase22-scene-composer.md
      - docs/implementation/phase23-model-provider-prompt-pack.md
      - docs/implementation/phase24-character-state-evolution.md
      - docs/implementation/phase25-candidate-promotion-state-apply.md
      - templates/scene.yaml
      - templates/prompts/scene_generation_system.md
      - templates/prompts/scene_generation_user.md
      - references/punctuation-standard.md
    output:
      - context packet
      - branch candidates
      - scene composition packet
      - draft candidate
      - review report
      - character state patch
    completion_gates:
      - context packet or equivalent project-state inspection completed
      - roleplay/branch/composition sidecars handled by platform agent when generated
      - prose candidate reviewed for canon, character, style, and punctuation
      - state patch remains candidate until reviewed and approved

  review_and_audit:
    protocol: review-and-audit
    when:
      - 审查、canon 检查、长篇连续性、章节 ready、发布前检查
    read:
      - references/artifact-contracts.md
      - references/punctuation-standard.md
      - docs/modules/review-ci.md
      - docs/implementation/phase4-scene-review-loop.md
      - docs/implementation/phase19-canon-lint.md
      - docs/implementation/phase7-chapter-pipeline.md
      - docs/implementation/phase8-longform-audit.md
    output:
      - blocking/warning/info findings
      - revision plan
      - approval gates
    completion_gates:
      - blocking findings separated from warnings
      - revision plan maps findings to artifacts
      - readiness and approval limits stated

  export_and_release:
    protocol: export-and-release
    when:
      - 导出小说、剧本、长视频提示词、DOCX 成品、发布章节、回滚说明
    read:
      - references/artifact-contracts.md
      - references/file-format-export.md
      - references/punctuation-standard.md
      - docs/implementation/phase9-export-package.md
      - docs/implementation/phase21-publish-chain.md
      - docs/implementation/phase15-approval-loop.md
    output:
      - export package
      - DOCX delivery files
      - release manifest
      - release notes
      - rollback notes
    completion_gates:
      - chapter/work readiness checked
      - approval record verified or pending approval stated
      - requested file formats generated and inspected
      - release notes and rollback notes prepared

  optional_cli:
    protocol: optional-cli
    when:
      - 需要确定性命令、回归测试、Dify/LangGraph、本地前端或批处理
    read:
      - references/workflows.md
      - references/orchestration.md
    inspect_if_present:
      - pyproject.toml
      - src/literary_engineering_workbench/cli.py
      - scripts/literary_engineering_workbench/cli.py
    output:
      - exact command
      - command result summary
      - generated artifact paths
    completion_gates:
      - CLI command selected from route needs, not convenience
      - stdout paths inspected
      - generated sidecars handled or listed as pending

do_not_assume:
  - local director-chat is the required top-level interface
  - local model-backed commands can independently decide creative direction
  - model output is canon
  - parsed JSON is accepted because it parses
  - retrieval is canon
  - simulation scores are final plot decisions
  - style similarity is originality safety
  - candidates may be promoted without review and approval
  - API keys may be written into work projects
